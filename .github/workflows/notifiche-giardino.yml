name: Giardino Daily Report

on:
  schedule:
    - cron: "0 6 * * *"   # ogni giorno alle 06:00 UTC (08:00 italiane)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install python-frontmatter requests

      - name: Generate daily report
        id: report
        run: |
          python3 scripts/giardino_today.py > report.txt
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat report.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post comment to issue
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: 1   # <-- METTI QUI IL NUMERO DELLA ISSUE
          body: |
            ## 🌱 Report giornaliero — ${{ github.run_id }}
            ```
            ${{ steps.report.outputs.report }}
            ```