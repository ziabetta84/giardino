name: Giardino Daily Report

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  giardino:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Add scripts to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)/scripts" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pip install python-frontmatter requests

      - name: Verify frontmatter installation
        run: python -c "import frontmatter; print('frontmatter OK')"

      - name: Run daily garden report
        run: python scripts/giardino_today.py
