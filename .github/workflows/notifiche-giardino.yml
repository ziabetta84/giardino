name: Giardino Daily Report

on:
  schedule:
    - cron: "0 7 * * *"   # ogni giorno alle 07:00 ora italiana
  workflow_dispatch:       # permette l'esecuzione manuale

jobs:
  giardino:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install frontmatter requests

      - name: Run daily garden report
        run: |
          python scripts/giardino_today.py
