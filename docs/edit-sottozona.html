<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Modifica Sottozona</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/pell/dist/pell.min.css">
  <script src="https://unpkg.com/pell"></script>
</head>
<body>

<nav class="topnav">
  <a href="index.html">🏠 Home</a>
  <a href="meteo.html">⛅ Meteo</a>
  <a href="zone.html">📍 Zone</a>
  <a href="piante.html?zona=casa">🌿 Piante</a>
  <a href="gallery.html">🖼️ Gallery</a>
</nav>
<h1 id="edit-title"></h1>

<form id="edit-form">

  <h2>Nome</h2>
  <input id="nome" type="text">

  <h2>Descrizione</h2>
  <div id="descrizione-editor" class="pell"></div>
  <textarea id="descrizione" style="display:none"></textarea>

  <h2>Esposizione</h2>
  <label><input type="checkbox" id="exp-nord"> Nord</label><br>
  <label><input type="checkbox" id="exp-sud"> Sud</label><br>
  <label><input type="checkbox" id="exp-est"> Est</label><br>
  <label><input type="checkbox" id="exp-ovest"> Ovest</label><br>

  <h2>Microclima</h2>
  <div id="microclima-editor" class="pell"></div>
  <textarea id="microclima" style="display:none"></textarea>


  <h2>Criticità</h2>
  <div id="criticita-editor" class="pell"></div>
  <textarea id="criticita" style="display:none"></textarea>

  <h2>Manutenzione</h2>
  <div id="manutenzione-editor" class="pell"></div>
  <textarea id="manutenzione" style="display:none"></textarea>

  <h2>Tipo</h2>
  <select id="tipo">
    <option value="interno">Interno</option>
    <option value="esterno">Esterno</option>
  </select>

  <br><br>
  <button type="submit">Salva</button>
</form>
<div id="status-bar">
  <div id="status-left">
    <span id="status-icon">🟢</span>
    <span id="status-text">Pronto</span>
  </div>
  <button id="status-action">Aggiorna</button>
</div>

<script src="js/api.js"></script>
<script src="js/edit-sottozona.js"></script>
</body>
</html>
