<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Il Giardino di Zorba - Piante</title> 
  <!-- Favicon e icone app -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <style>
    /* MODALE ELIMINAZIONE */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      text-align: center;
    }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn-cancel {
      background: #ddd;
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-delete {
      background: #d9534f;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn-cancel:hover {
      background: #ccc;
    }

    .btn-delete:hover {
      background: #c9302c;
    }
  </style>
</head>

<body>

<nav class="topnav">
  <a href="index.html">🏠 Home</a>
  <a href="meteo.html">⛅ Meteo</a>
  <a href="zone.html">📍 Zone</a>
  <a href="piante.html">🌿 Piante</a>
  <a href="gallery.html">🖼️ Gallery</a>
</nav>

<h1 id="page-title">Piante</h1>

<div class="add-zone-container">
  <a id="add-plant-btn" class="add-zone-btn">➕ Aggiungi Pianta</a>
</div>

<div id="piante-list"></div>

<div id="status-bar">
  <div id="status-left">
    <span id="status-icon">🟢</span>
    <span id="status-text">Pronto</span>
  </div>
  <button id="status-action">Aggiorna</button>
</div>

<!-- MODALE ELIMINAZIONE -->
<div id="delete-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>Eliminare questa pianta?</h3>
    <p>Questa azione non può essere annullata.</p>

    <div class="modal-actions">
      <button id="modal-cancel" class="btn-cancel">Annulla</button>
      <button id="modal-confirm" class="btn-delete">Elimina</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="js/api.js"></script>
<script src="js/piante.js"></script>
<script src="js/status.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
