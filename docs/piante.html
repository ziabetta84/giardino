---
layout: default
title: "Il Giardino di Zorba - Piante"
scripts: |
  <script src="js/piante.js"></script>
  <script src="js/uploadPhoto.js?v=20260519"></script>
  <script>
    const zona = new URLSearchParams(location.search).get("zona");
    const links = document.querySelectorAll(".zone-link");

    links.forEach(link => {
      const url = new URL(link.href);
      const z = url.searchParams.get("zona");

      if (!zona && !z) {
        link.classList.add("active"); // "Tutte"
      } else if (zona === z) {
        link.classList.add("active");
      }
    });
  </script>
---

<div id="zone-submenu" class="zone-submenu"></div>

<div class="add-zone-container">
  <a id="add-plant-btn" class="add-zone-btn">➕ Aggiungi Pianta</a>
</div>

<div id="piante-list"></div>

  <div class="modal-box">
    <h3>Eliminare questa pianta?</h3>
    <p>Questa azione non può essere annullata.</p>

    <div class="modal-actions">
      <button id="modal-cancel" class="btn-cancel">Annulla</button>
      <button id="modal-confirm" class="btn-delete">Elimina</button>
    </div>
  </div>
</div>
