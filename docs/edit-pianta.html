<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Il Giardino di Zorba - Modifica Pianta</title>
  <!-- Favicon e icone app -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2b2b2b">

  <link rel="stylesheet" href="style.css">

  <style>
    /* Editor specie */
    #specie-editor {
      padding: 15px;
      border-radius: 10px;
      background: #f7f7f7;
      border: 1px solid #ddd;
      margin-top: 15px;
    }

    #specie-editor label {
      margin-top: 10px;
      font-weight: 600;
      display: block;
    }

    #specie-editor input,
    #specie-editor textarea {
      width: 100%;
      margin-top: 4px;
    }

    .specie-actions {
      display: flex;
      gap: 10px;
      margin: 10px 0 20px 0;
    }

    .specie-actions button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #ddd;
    }

    .specie-actions button:hover {
      background: #ccc;
    }

    /* TAB */
    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 10px;
    }

    .tab-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #aaa;
      background: #eee;
      cursor: pointer;
      font-weight: 600;
    }

    .tab-btn.active {
      background: #d0e6ff;
      border-color: #5a9cff;
    }

    .tab-content {
      display: none;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .tab-content input {
      width: 100%;
      padding: 4px;
    }
  </style>
</head>

<body>


<nav class="topnav">
  <a href="index.html">🏠 Home</a>
  <a href="meteo.html">⛅ Meteo</a>
  <a href="zone.html">📍 Zone</a>
  <a href="piante.html">🌿 Piante</a>
  <a href="gallery.html">🖼️ Gallery</a>
</nav>

<h1 id="edit-title">Modifica Pianta</h1>

<form id="edit-form" class="edit-form">

  <!-- SPECIE -->
  <label>Specie</label>
  <select id="specie"></select>

  <div class="specie-actions">
    <button type="button" id="new-specie-btn">➕ Nuova specie</button>
    <button type="button" id="edit-specie-btn">✏️ Modifica specie</button>
  </div>

  <!-- EDITOR SPECIE (NASCOSTO) -->
  <div id="specie-editor" style="display:none;">
    <h3 id="specie-editor-title">Nuova specie</h3>

    <label>Nome</label>
    <input id="specie-nome" type="text">

    <label>Specie botanica</label>
    <input id="specie-specie" type="text">

    <label>Descrizione (HTML)</label>
    <textarea id="specie-descrizione" rows="4"></textarea>

    <label>Luce</label>
    <input id="specie-luce" type="text">

    <label>Acqua</label>
    <input id="specie-acqua" type="text">

    <label>Terreno</label>
    <input id="specie-terreno" type="text">

    <label>Alert (uno per riga)</label>
    <textarea id="specie-alert" rows="3"></textarea>

    <!-- ============================
         MANUTENZIONE CON TAB
         ============================ -->

    <h3>Manutenzione</h3>

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="tab-irrig">Irrigazione</button>
      <button type="button" class="tab-btn" data-tab="tab-conc">Concimazione</button>
      <button type="button" class="tab-btn" data-tab="tab-pot">Potatura</button>
    </div>

    <!-- IRRIGAZIONE -->
    <div id="tab-irrig" class="tab-content active">
      <label>Primavera <input id="man-irrig-primavera" type="text"></label>
      <label>Estate <input id="man-irrig-estate" type="text"></label>
      <label>Autunno <input id="man-irrig-autunno" type="text"></label>
      <label>Inverno <input id="man-irrig-inverno" type="text"></label>
    </div>

    <!-- CONCIMAZIONE -->
    <div id="tab-conc" class="tab-content">
      <label>Primavera <input id="man-conc-primavera" type="text"></label>
      <label>Estate <input id="man-conc-estate" type="text"></label>
      <label>Autunno <input id="man-conc-autunno" type="text"></label>
      <label>Inverno <input id="man-conc-inverno" type="text"></label>
    </div>

    <!-- POTATURA -->
    <div id="tab-pot" class="tab-content">
      <label>Primavera <input id="man-pot-primavera" type="text"></label>
      <label>Estate <input id="man-pot-estate" type="text"></label>
      <label>Autunno <input id="man-pot-autunno" type="text"></label>
      <label>Inverno <input id="man-pot-inverno" type="text"></label>
    </div>

  </div>

  <hr style="margin:25px 0;">

  <!-- ZONA -->
  <label>Zona</label>
  <select id="zona"></select>

  <!-- SOTTOZONA -->
  <label>Sottozona</label>
  <select id="sottozona">
    <option value="">(nessuna)</option>
  </select>

  <!-- VARIETÀ -->
  <label>Varietà</label>
  <input id="varieta" type="text">

  <!-- DATA IMPIANTO -->
  <label>Data impianto</label>
  <input id="impianto" type="date">

  <!-- NOTE -->
  <label>Note</label>
  <textarea id="note" rows="4"></textarea>

  <button type="submit" class="save-btn">Salva</button>
</form>

<div id="status-bar">
  <div id="status-left">
    <span id="status-icon">🟢</span>
    <span id="status-text">Pronto</span>
  </div>
  <button id="status-action">Aggiorna</button>
</div>

<script src="js/api.js"></script>
<script src="js/edit-pianta.js"></script>
<script src="js/status.js"></script>

<!-- SCRIPT TAB -->
<script>
  document.addEventListener("click", (e) => {
    if (!e.target.classList.contains("tab-btn")) return;

    const tab = e.target.dataset.tab;

    document.querySelectorAll(".tab-btn").forEach(btn =>
      btn.classList.toggle("active", btn === e.target)
    );

    document.querySelectorAll(".tab-content").forEach(box =>
      box.classList.toggle("active", box.id === tab)
    );
  });
</script>

</body>
</html>
